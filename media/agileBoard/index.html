<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{CSP_SOURCE}} 'unsafe-inline'; font-src {{CSP_SOURCE}}; script-src 'nonce-{{NONCE}}'; img-src {{CSP_SOURCE}} https: data:; connect-src {{CSP_SOURCE}}; frame-src 'none';">
  <link rel="stylesheet" href="{{CODICONS}}">
  <link rel="stylesheet" href="{{SHARED}}">
  <link rel="stylesheet" href="{{STYLE}}">
</head>
<body>
  <header class="board-header">
    <div class="board-title">
      <h1 id="boardTitle">Agile Board</h1>
    </div>
    <div class="board-controls">
      <label class="sprint-label">Sprint
        <select id="sprintPicker"></select>
      </label>
      <label class="sprint-label">Group
        <select id="sortPicker">
          <option value="default">Default (no swimlanes)</option>
          <optgroup label="Swimlane by…">
            <option value="priority">Priority</option>
            <option value="assignee">Assignee</option>
            <option value="state">State</option>
          </optgroup>
          <optgroup label="Sort columns by…">
            <option value="updated">Recently updated</option>
            <option value="created">Recently created</option>
            <option value="id">Issue ID</option>
            <option value="summary">Summary</option>
          </optgroup>
        </select>
      </label>
      <label class="sprint-label">Color by
        <select id="colorByPicker">
          <option value="state">State</option>
          <option value="priority">Priority</option>
          <option value="none">None</option>
        </select>
      </label>
      <button type="button" id="createBtn" class="refresh-btn" title="Create new issue"><i class="codicon codicon-add"></i> New</button>
      <button type="button" id="openInBrowserBtn" class="refresh-btn" title="Open board in YouTrack"><i class="codicon codicon-link-external"></i></button>
      <button type="button" id="refreshBtn" class="refresh-btn" title="Refresh board"><i class="codicon codicon-refresh"></i></button>
    </div>
    <div class="board-filters" id="boardFilters">
      <input type="search" id="filterText" class="filter-input" placeholder="Filter (id / summary / tag)" aria-label="Text filter">
      <select id="filterAssignee" class="filter-pick" aria-label="Filter by assignee"><option value="">Assignee: Any</option></select>
      <select id="filterPriority" class="filter-pick" aria-label="Filter by priority"><option value="">Priority: Any</option></select>
      <select id="filterTag" class="filter-pick" aria-label="Filter by tag"><option value="">Tag: Any</option></select>
      <button type="button" id="filterClear" class="refresh-btn" title="Clear filters" hidden><i class="codicon codicon-close"></i></button>
      <span class="filter-count" id="filterCount"></span>
    </div>
  </header>
  <div id="board" class="board">
    <div class="board-loading">
      <div style="display:flex;gap:0.6rem;padding:0.75rem">
        <div style="flex:1">
          <div class="skeleton-card"><span class="skeleton line long"></span><span class="skeleton line short"></span></div>
          <div class="skeleton-card"><span class="skeleton line long"></span><span class="skeleton line short"></span></div>
        </div>
        <div style="flex:1">
          <div class="skeleton-card"><span class="skeleton line long"></span><span class="skeleton line short"></span></div>
        </div>
        <div style="flex:1">
          <div class="skeleton-card"><span class="skeleton line long"></span><span class="skeleton line short"></span></div>
          <div class="skeleton-card"><span class="skeleton line long"></span><span class="skeleton line short"></span></div>
        </div>
      </div>
    </div>
  </div>
  <script nonce="{{NONCE}}" src="{{MD_EDITOR}}"></script>
  <script nonce="{{NONCE}}" src="{{MAIN}}"></script>
</body>
</html>
