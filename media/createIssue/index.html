<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{CSP_SOURCE}} 'unsafe-inline'; font-src {{CSP_SOURCE}}; script-src 'nonce-{{NONCE}}'; img-src {{CSP_SOURCE}} https: data:; connect-src {{CSP_SOURCE}}; frame-src 'none';">
  <link rel="stylesheet" href="{{CODICONS}}">
  <link rel="stylesheet" href="{{SHARED}}">
  <link rel="stylesheet" href="{{STYLE}}">
</head>
<body>
  <form id="createForm" class="layout">
    <div class="main">
      <div class="header card-surface">
        <div class="id-row">
          <span class="id">New issue</span>
          <span class="sep">·</span>
          <span id="projectHint" class="project-hint"></span>
        </div>
        <input id="summaryIn" name="summary" class="summary-input" type="text" placeholder="Enter a summary" required maxlength="250" autocomplete="off">
      </div>

      <div class="section card-surface">
        <h3>Description</h3>
        <div class="desc-zone md-form" id="descForm">
          <div class="md-tabs">
            <button type="button" class="md-tab active" data-md-tab="write">Write</button>
            <button type="button" class="md-tab" data-md-tab="preview">Preview</button>
          </div>
          <div class="comment-toolbar">
            <button type="button" data-md="bold" title="Bold (Ctrl+B)"><i class="codicon codicon-bold"></i></button>
            <button type="button" data-md="italic" title="Italic (Ctrl+I)"><i class="codicon codicon-italic"></i></button>
            <button type="button" data-md="strike" title="Strikethrough"><i class="codicon codicon-symbol-string"></i></button>
            <button type="button" data-md="code" title="Inline code (Ctrl+E)"><i class="codicon codicon-code"></i></button>
            <button type="button" data-md="codeblock" title="Code block"><i class="codicon codicon-json"></i></button>
            <button type="button" data-md="link" title="Link (Ctrl+K)"><i class="codicon codicon-link"></i></button>
            <span class="sep"></span>
            <button type="button" data-md="ul" title="Bulleted list"><i class="codicon codicon-list-unordered"></i></button>
            <button type="button" data-md="ol" title="Numbered list"><i class="codicon codicon-list-ordered"></i></button>
            <button type="button" data-md="quote" title="Quote"><i class="codicon codicon-quote"></i></button>
          </div>
          <textarea id="descIn" name="description" placeholder="Type or paste a description of the issue here (Markdown supported)" rows="12"></textarea>
          <div class="md-preview md-body" hidden></div>
        </div>
      </div>

      <div class="actions">
        <button type="submit" id="submitBtn" class="btn primary"><i class="codicon codicon-add"></i> Create</button>
        <button type="button" id="cancelBtn" class="btn">Cancel</button>
        <div class="status" id="status"></div>
      </div>
    </div>

    <aside class="side card-surface">
      <div class="side-field">
        <label class="label" for="projectSel">Project</label>
        <select id="projectSel" name="project" required></select>
      </div>
      <div class="side-field">
        <label class="label" for="typeSel">Type</label>
        <select id="typeSel" name="type"><option value="">(default)</option></select>
      </div>
      <div class="side-field">
        <label class="label" for="prioritySel">Priority</label>
        <select id="prioritySel" name="priority"><option value="">(default)</option></select>
      </div>
      <div class="side-field">
        <label class="label" for="assigneeSel">Assignee</label>
        <select id="assigneeSel" name="assignee">
          <option value="">(unassigned)</option>
        </select>
      </div>
      <div class="side-field side-field-static">
        <span class="label">State</span>
        <span class="value muted">Set by workflow</span>
      </div>
      <div class="side-field side-field-static">
        <span class="label">Tags</span>
        <span class="value muted">Add after create</span>
      </div>
    </aside>
  </form>
  <script nonce="{{NONCE}}" src="{{MD_EDITOR}}"></script>
  <script nonce="{{NONCE}}" src="{{MAIN}}"></script>
</body>
</html>
