<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="{{SHARED}}">
  <link rel="stylesheet" href="{{STYLE}}">
</head>
<body>
  <div class="wrapper">
    <h2>Create issue</h2>
    <form id="createForm">
      <div class="row">
        <label for="projectSel">Project</label>
        <select id="projectSel" name="project" required></select>
      </div>
      <div class="row">
        <label for="summaryIn">Summary</label>
        <input id="summaryIn" name="summary" type="text" placeholder="Short description of the issue" required maxlength="250">
      </div>

      <div class="row row-compact">
        <div class="row-sub">
          <label for="typeSel">Type</label>
          <select id="typeSel" name="type"><option value="">(default)</option></select>
        </div>
        <div class="row-sub">
          <label for="prioritySel">Priority</label>
          <select id="prioritySel" name="priority"><option value="">(default)</option></select>
        </div>
        <div class="row-sub">
          <label for="assigneeSel">Assignee</label>
          <select id="assigneeSel" name="assignee">
            <option value="">(unassigned)</option>
          </select>
        </div>
      </div>

      <div class="row">
        <label>Description</label>
        <div class="desc-zone md-form" id="descForm">
          <div class="md-tabs">
            <button type="button" class="md-tab active" data-md-tab="write">Write</button>
            <button type="button" class="md-tab" data-md-tab="preview">Preview</button>
          </div>
          <div class="comment-toolbar">
            <button type="button" data-md="bold" title="Bold (Ctrl+B)"><strong>B</strong></button>
            <button type="button" data-md="italic" title="Italic (Ctrl+I)"><em>I</em></button>
            <button type="button" data-md="strike" title="Strikethrough"><s>S</s></button>
            <button type="button" data-md="code" title="Inline code (Ctrl+E)">&lt;/&gt;</button>
            <button type="button" data-md="codeblock" title="Code block">{ }</button>
            <button type="button" data-md="link" title="Link (Ctrl+K)">🔗</button>
            <span class="sep"></span>
            <button type="button" data-md="ul" title="Bulleted list">•</button>
            <button type="button" data-md="ol" title="Numbered list">1.</button>
            <button type="button" data-md="quote" title="Quote">&gt;</button>
          </div>
          <textarea id="descIn" name="description" placeholder="Add more context (markdown supported)" rows="10"></textarea>
          <div class="md-preview md-body" hidden></div>
        </div>
      </div>
      <div class="actions">
        <button type="submit" id="submitBtn" class="btn primary">Create</button>
        <button type="button" id="cancelBtn" class="btn">Cancel</button>
        <div class="status" id="status"></div>
      </div>
    </form>
  </div>
  <script src="{{MAIN}}"></script>
</body>
</html>
