name: Release

# Two entry points, both produce the same outcome (version bump,
# changelog, .vsix on the GitHub release, Open VSX upload, Marketplace
# upload):
#
#   1. workflow_dispatch with a `bump` input — invoked from VS Code's
#      "Release Extension" task. The workflow itself bumps the version
#      in package.json, regenerates CHANGELOG.md, commits + tags, and
#      then proceeds with the build/release/publish chain.
#
#   2. push: tags 'v*.*.*' — for direct git-push releases (e.g. when
#      the bump was done by hand). The bump step is skipped because
#      package.json already matches the tag.
#
# Single universal .vsix (no per-platform matrix) — the AI features
# spawn the user's own `claude` CLI from PATH instead of bundling a
# platform-specific Claude Code binary. .vsix size collapsed from
# ~80MB (compressed, max one platform) to ~5MB (universal).
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (patch | minor | major)"
        type: choice
        required: true
        default: patch
        options: [patch, minor, major]
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Bump version + changelog (workflow_dispatch only)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          newVersion=$(npm version ${{ inputs.bump }} --no-git-tag-version | sed 's/^v//')
          echo "Bumped to $newVersion"

          npx --yes auto-changelog --commit-limit false --hide-credit --latest-version "v$newVersion"

          git add package.json package-lock.json CHANGELOG.md
          git commit -m "[BUILD] Bump version to $newVersion" -m "[skip ci]"
          git tag -a "v$newVersion" -m "Version $newVersion"
          git push origin main
          git push origin "v$newVersion"

      - name: Resolve tag + version
        id: tag
        shell: bash
        run: |
          tag=$(git describe --tags --abbrev=0)
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved $tag / $version"

      - run: npm run build
      - run: npm test
      - name: Package .vsix
        run: npx --yes @vscode/vsce package --no-yarn

      - name: Extract changelog section for this release
        id: changelog-section
        shell: bash
        run: |
          version="${{ steps.tag.outputs.version }}"
          if [ ! -f CHANGELOG.md ]; then
            echo "section=See release notes for details." >> "$GITHUB_OUTPUT"
            exit 0
          fi
          section=$(awk "/^## \[?v?${version}\]?(\(|$)/{found=1; next} /^## \[?v?[0-9]+\.[0-9]+\.[0-9]+\]?/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$section" ]; then section="See CHANGELOG.md for details."; fi
          {
            echo "section<<EOF"
            echo "$section"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            ## What's Changed

            ${{ steps.changelog-section.outputs.section }}

            ## Full changelog

            ${{ github.server_url }}/${{ github.repository }}/blob/main/CHANGELOG.md
          files: '*.vsix'

      # Open VSX (https://open-vsx.org) — VSCodium / Cursor / Theia /
      # Gitpod. Skip cleanly when the secret isn't configured.
      - name: Publish to Open VSX
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        shell: bash
        run: |
          if [ -z "$OVSX_TOKEN" ]; then
            echo "OVSX_TOKEN not set; skipping Open VSX publish."
            exit 0
          fi
          vsix=$(ls *.vsix | head -n 1)
          [ -n "$vsix" ] || { echo "No .vsix found."; exit 1; }
          npx --yes ovsx publish "$vsix" -p "$OVSX_TOKEN"

      # VS Code Marketplace. Skip cleanly when the secret isn't
      # configured.
      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT not set; skipping Marketplace publish."
            exit 0
          fi
          vsix=$(ls *.vsix | head -n 1)
          [ -n "$vsix" ] || { echo "No .vsix found."; exit 1; }
          npx --yes @vscode/vsce publish --packagePath "$vsix" --pat "$VSCE_PAT"
